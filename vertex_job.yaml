displayName: polars-lm-train
jobSpec:
  workerPoolSpecs:
    - machineSpec:
        machineType: n1-standard-8
        acceleratorType: NVIDIA_TESLA_T4
        acceleratorCount: 1
      replicaCount: 1
      containerSpec:
        imageUri: us-central1-docker.pkg.dev/PROJECT_ID/polars-lm/trainer:latest
        args:
          - --data-path
          - /gcs/YOUR_BUCKET/datasets/train.txt
          - --output-dir
          - /gcs/YOUR_BUCKET/polars-lm-artifacts
          - --epochs
          - "5"
          - --batch-size
          - "64"
